<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز سيبويه</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #FBF9F7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 420px; text-align: center; }
        .logo { width: 120px; border-radius: 50%; margin: 0 auto 20px; display: block; }
        .title { font-size: 24px; font-weight: 900; color: #1E4D5C; margin-bottom: 20px; }
        .form-box { background: #fff; border-radius: 20px; padding: 25px 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.06); display: none; flex-direction: column; gap: 14px; }
        .form-box.active { display: flex; }
        .input-group { text-align: right; }
        .input-group label { display: block; font-size: 14px; font-weight: 700; color: #1E4D5C; margin-bottom: 4px; }
        .password-wrapper { position: relative; display: flex; align-items: center; }
        .password-wrapper input { width: 100%; padding: 12px 44px 12px 10px; border: 2px solid #d5dbe3; border-radius: 12px; font-size: 16px; font-weight: 600; background: #fafbfc; color: #1e293b; }
        .password-wrapper input:focus { outline: none; border-color: #C9A84C; }
        .eye-icon {
            position: absolute;
            left: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            z-index: 2;
        }
        .eye-icon svg { width: 22px; height: 22px; fill: #8B9BAF; transition: fill 0.2s; }
        .eye-icon:hover svg { fill: #1E4D5C; }
        .eye-icon.show svg.eye-open { display: none; }
        .eye-icon:not(.show) svg.eye-closed { display: none; }
        .input-group input { width: 100%; padding: 12px 10px; border: 2px solid #d5dbe3; border-radius: 12px; font-size: 16px; font-weight: 600; background: #fafbfc; color: #1e293b; }
        .input-group input:focus { outline: none; border-color: #C9A84C; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; background: #1E4D5C; color: #fff; margin-top: 6px; }
        .btn:active { background: #152e3a; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .switch-link { font-size: 14px; font-weight: 700; color: #1E4D5C; cursor: pointer; text-decoration: underline; margin-top: 4px; }
        .msg { font-size: 14px; font-weight: 600; min-height: 18px; }
        .msg.error { color: #d32f2f; }
        .msg.success { color: #2e7d32; }
        .msg.info { color: #f39c12; }
        .password-strength { height: 4px; border-radius: 2px; margin-top: 4px; transition: all 0.3s; background: #eee; }
        .password-strength.weak { background: #e94560; }
        .password-strength.medium { background: #f39c12; }
        .password-strength.strong { background: #2ed573; }
    </style>
</head>

<script>
    const sb = supabase.createClient(
        'https://mxacecdlzckykkvdpzbz.supabase.co',
        'sb_publishable_-1TlYGF9ZprgRnTuS5UK1w_07BvRaBD'
    );

    // ========== دوال إظهار/إخفاء كلمة المرور ==========
    function togglePassword(inputId, eyeId) {
        const input = document.getElementById(inputId);
        const eye = document.getElementById(eyeId);
        if (input.type === 'password') {
            input.type = 'text';
            eye.classList.add('show');
        } else {
            input.type = 'password';
            eye.classList.remove('show');
        }
    }

    // ========== دوال التبديل بين الفورمين ==========
    function showLogin() {
        document.getElementById('signupBox').classList.remove('active');
        document.getElementById('loginBox').classList.add('active');
        document.getElementById('loginMsg').textContent = '';
    }
    function showSignup() {
        document.getElementById('loginBox').classList.remove('active');
        document.getElementById('signupBox').classList.add('active');
        document.getElementById('signupMsg').textContent = '';
    }

    // ========== التحقق من صحة البريد الإلكتروني ==========
    function isValidEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
    }

    // ========== قياس قوة كلمة المرور ==========
    function checkPasswordStrength(password) {
        const strengthEl = document.getElementById('passwordStrength');
        if (!strengthEl) return;
        if (!password) {
            strengthEl.className = 'password-strength';
            return;
        }
        let strength = 0;
        if (password.length >= 8) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/\d/.test(password)) strength++;
        if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
        
        strengthEl.className = 'password-strength';
        if (strength <= 1) strengthEl.classList.add('weak');
        else if (strength <= 3) strengthEl.classList.add('medium');
        else strengthEl.classList.add('strong');
    }

    // ========== دالة توليد رمز جلسة فريد ==========
    function generateToken() {
        // يُنشئ رمزاً عشوائياً للجلسة
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    // ========== دالة إنشاء جلسة في Supabase ==========
    async function createSession(userData) {
        const token = generateToken();
        const now = new Date();
        // صلاحية الجلسة 30 يومًا
        const expiresAt = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);
        
        const { data, error } = await sb
            .from('sessions')
            .insert([{
                user_id: userData.id,
                token: token,
                expires_at: expiresAt.toISOString(),
                is_valid: true
            }])
            .select('token')
            .single();

        if (error) {
            console.error('فشل في إنشاء الجلسة:', error);
            return null;
        }

        // تخزين بيانات المستخدم ورمز الجلسة في المتصفح
        localStorage.setItem('sibawayhUser', JSON.stringify(userData));
        localStorage.setItem('sessionToken', data.token);
        return data.token;
    }

    // ========== دالة التحقق من الجلسة الموجودة ==========
    async function checkExistingSession() {
        const savedUser = localStorage.getItem('sibawayhUser');
        const savedToken = localStorage.getItem('sessionToken');

        // لا توجد جلسة محفوظة، اعرض فورم تسجيل الدخول
        if (!savedUser || !savedToken) {
            return false;
        }

        try {
            // التحقق من صلاحية الجلسة في Supabase
            const now = new Date().toISOString();
            const { data, error } = await sb
                .from('sessions')
                .select('*')
                .eq('token', savedToken)
                .eq('is_valid', true)
                .gt('expires_at', now)
                .single();

            if (error || !data) {
                // الجلسة غير صالحة، نظف البيانات المحفوظة
                localStorage.removeItem('sibawayhUser');
                localStorage.removeItem('sessionToken');
                return false;
            }

            // جلسة صالحة → توجيه فوري للوحة التحكم
            window.location.href = 'main.html';
            return true;
        } catch (e) {
            console.error('خطأ في التحقق من الجلسة:', e);
            return false;
        }
    }

    // ========== ربط الأحداث عند تحميل الصفحة ==========
    window.addEventListener('load', async function() {
        // ------ الفحص الذكي الأول: البحث عن جلسة صالحة ------
        const hasValidSession = await checkExistingSession();
        // إذا كان هناك جلسة صالحة، لن يكمل الكود هنا لأنه تم التوجيه لـ main.html
        
        // إذا لم توجد جلسة، يكمل تجهيز الصفحة بشكل طبيعي:
        document.getElementById('signupBtn').addEventListener('click', handleSignup);
        document.getElementById('loginBtn').addEventListener('click', handleLogin);
        document.getElementById('goToLogin').addEventListener('click', showLogin);
        document.getElementById('goToSignup').addEventListener('click', showSignup);
        
        // مراقبة قوة كلمة المرور
        document.getElementById('signupPassword').addEventListener('input', function() {
            checkPasswordStrength(this.value);
        });
        
        // السماح بالدخول عبر Enter
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('signupPhone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleSignup();
        });
    });

    // ========== إنشاء حساب ==========
    async function handleSignup() {
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
        const fullName = document.getElementById('signupName').value.trim();
        const country = document.getElementById('signupCountry').value.trim() || null;
        const age = parseInt(document.getElementById('signupAge').value) || null;
        const phone = document.getElementById('signupPhone').value.trim().replace(/\s+/g, '') || null;
        const msgEl = document.getElementById('signupMsg');
        const btnEl = document.getElementById('signupBtn');

        msgEl.className = 'msg';
        msgEl.textContent = '';

        if (!email) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'البريد الإلكتروني مطلوب';
            return;
        }
        if (!isValidEmail(email)) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'صيغة البريد الإلكتروني غير صحيحة';
            return;
        }
        if (!password) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'كلمة المرور مطلوبة';
            return;
        }
        if (password.length < 6) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
            return;
        }
        if (password !== passwordConfirm) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'كلمتا المرور غير متطابقتين';
            return;
        }
        if (!fullName) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'الاسم الكامل مطلوب';
            return;
        }

        btnEl.disabled = true;
        btnEl.textContent = 'جاري إنشاء الحساب...';

        const { data: existingUser, error: checkError } = await sb
            .from('sibawayh')
            .select('id')
            .eq('email', email)
            .maybeSingle();

        if (checkError) {
            console.error('خطأ في التحقق:', checkError);
            msgEl.className = 'msg error';
            msgEl.textContent = 'حدث خطأ في التحقق من البريد الإلكتروني';
            btnEl.disabled = false;
            btnEl.textContent = 'إنشاء حساب';
            return;
        }
        if (existingUser) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'هذا البريد الإلكتروني مسجل بالفعل. يرجى تسجيل الدخول.';
            btnEl.disabled = false;
            btnEl.textContent = 'إنشاء حساب';
            return;
        }

        const { error } = await sb
            .from('sibawayh')
            .insert([{ email, password, full_name: fullName, country, age, phone }]);

        btnEl.disabled = false;
        btnEl.textContent = 'إنشاء حساب';

        if (error) {
            console.error('تفاصيل الخطأ:', error);
            msgEl.className = 'msg error';
            msgEl.textContent = 'فشل في إنشاء الحساب: ' + (error.message || 'حاول مرة أخرى');
            return;
        }

        msgEl.className = 'msg success';
        msgEl.textContent = 'تم إنشاء الحساب بنجاح! جاري تحويلك لتسجيل الدخول...';
        setTimeout(() => {
            showLogin();
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginMsg').textContent = '';
        }, 2000);
    }

    // ========== تسجيل الدخول (مُحدَّث لإنشاء جلسة) ==========
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const msgEl = document.getElementById('loginMsg');
        const btnEl = document.getElementById('loginBtn');

        msgEl.className = 'msg';
        msgEl.textContent = '';

        if (!email || !password) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'أدخل البريد الإلكتروني وكلمة المرور';
            return;
        }

        btnEl.disabled = true;
        btnEl.textContent = 'جاري تسجيل الدخول...';

        const { data, error } = await sb
            .from('sibawayh')
            .select('*')
            .eq('email', email)
            .eq('password', password)
            .single();

        btnEl.disabled = false;
        btnEl.textContent = 'دخول';

        if (error || !data) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'بيانات الدخول غير صحيحة';
            return;
        }
        if (data.banned === true) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'تم حظر حسابك من قبل الإدارة. يرجى التواصل للدعم.';
            return;
        }

        // --- إنشاء الجلسة الذكية بعد تسجيل الدخول الناجح ---
        const token = await createSession(data);
        if (!token) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'فشل في حفظ الجلسة. حاول مرة أخرى.';
            return;
        }
        // --------------------------------------------

        // توجيه المستخدم للوحة التحكم
        window.location.href = 'main.html';
    }
</script>
