<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز سيبويه</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #FBF9F7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 120px; border-radius: 50%; margin: 0 auto 20px; display: block; }
        .title { font-size: 24px; font-weight: 900; color: #1E4D5C; margin-bottom: 20px; }
        .form-box { background: #fff; border-radius: 20px; padding: 25px 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.06); display: none; flex-direction: column; gap: 14px; }
        .form-box.active { display: flex; }
        .input-group { text-align: right; }
        .input-group label { display: block; font-size: 14px; font-weight: 700; color: #1E4D5C; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 12px 10px; border: 2px solid #d5dbe3; border-radius: 12px; font-size: 16px; font-weight: 600; background: #fafbfc; color: #1e293b; }
        .input-group input:focus { outline: none; border-color: #C9A84C; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; background: #1E4D5C; color: #fff; margin-top: 6px; }
        .btn:active { background: #152e3a; }
        .switch-link { font-size: 14px; font-weight: 700; color: #1E4D5C; cursor: pointer; text-decoration: underline; margin-top: 4px; }
        .msg { font-size: 14px; font-weight: 600; min-height: 18px; }
        .msg.error { color: #d32f2f; }
        .msg.success { color: #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://b.top4top.io/p_3812z0ztb0.png" alt="Logo" class="logo">

    <!-- فورم إنشاء الحساب -->
    <div id="signupBox" class="form-box active">
        <div class="title">إنشاء حساب جديد</div>
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="signupEmail" placeholder="example@mail.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="signupPassword" placeholder="كلمة مرور قوية">
        </div>
        <div class="input-group">
            <label>الاسم الكامل</label>
            <input type="text" id="signupName" placeholder="الاسم ثلاثي">
        </div>
        <div class="input-group">
            <label>السن</label>
            <input type="number" id="signupAge" placeholder="العمر" min="5" max="100">
        </div>
        <div class="input-group">
            <label>رقم الهاتف</label>
            <input type="tel" id="signupPhone" placeholder="01xxxxxxxxx">
        </div>
        <button class="btn" id="signupBtn">إنشاء حساب</button>
        <div id="signupMsg" class="msg"></div>
        <div class="switch-link" id="goToLogin">لديك حساب؟ تسجيل الدخول</div>
    </div>

    <!-- فورم تسجيل الدخول -->
    <div id="loginBox" class="form-box">
        <div class="title">تسجيل الدخول</div>
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="loginEmail" placeholder="example@mail.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
        </div>
        <button class="btn" id="loginBtn">دخول</button>
        <div id="loginMsg" class="msg"></div>
        <div class="switch-link" id="goToSignup">ليس لديك حساب؟ إنشاء حساب جديد</div>
    </div>
</div>

<script>
    // استخدم اسم مختلف لتجنب التعارض
    const sb = supabase.createClient(
        'https://mxacecdlzckykkvdpzbz.supabase.co',
        'sb_publishable_-1TlYGF9ZprgRnTuS5UK1w_07BvRaBD'
    );

    // دوال التبديل بين الفورمين
    function showLogin() {
        document.getElementById('signupBox').classList.remove('active');
        document.getElementById('loginBox').classList.add('active');
    }
    function showSignup() {
        document.getElementById('loginBox').classList.remove('active');
        document.getElementById('signupBox').classList.add('active');
    }

    // ربط الأزرار والروابط عند تحميل الصفحة
    window.addEventListener('load', function() {
        document.getElementById('signupBtn').addEventListener('click', handleSignup);
        document.getElementById('loginBtn').addEventListener('click', handleLogin);
        document.getElementById('goToLogin').addEventListener('click', showLogin);
        document.getElementById('goToSignup').addEventListener('click', showSignup);
    });

    // إنشاء حساب
    async function handleSignup() {
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const fullName = document.getElementById('signupName').value.trim();
        const age = parseInt(document.getElementById('signupAge').value) || null;
        const phone = document.getElementById('signupPhone').value.trim() || null;
        const msgEl = document.getElementById('signupMsg');

        msgEl.className = 'msg';
        msgEl.textContent = '';

        if (!email || !password || !fullName) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'الإيميل والاسم وكلمة المرور مطلوبين';
            return;
        }

        const { error } = await sb
            .from('sibawayh')
            .insert([{ email, password, full_name: fullName, age, phone }]);

        if (error) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'فشل: ' + error.message;
            return;
        }

        msgEl.className = 'msg success';
        msgEl.textContent = 'تم إنشاء الحساب بنجاح! انتقل لتسجيل الدخول.';

        // نقل تلقائي لفورم الدخول بعد ثانيتين
        setTimeout(() => {
            showLogin();
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginMsg').textContent = '';
        }, 2000);
    }

    // تسجيل الدخول
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const msgEl = document.getElementById('loginMsg');

        msgEl.className = 'msg';
        msgEl.textContent = '';

        if (!email || !password) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'أدخل البريد الإلكتروني وكلمة المرور';
            return;
        }

        const { data, error } = await sb
            .from('sibawayh')
            .select('*')
            .eq('email', email)
            .eq('password', password)
            .single();

        if (error || !data) {
            msgEl.className = 'msg error';
            msgEl.textContent = 'بيانات الدخول غير صحيحة';
            return;
        }

        localStorage.setItem('sibawayhUser', JSON.stringify(data));
        window.location.href = 'main.html';
    }
</script>

</body>
</html>
