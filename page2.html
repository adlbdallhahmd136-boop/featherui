<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>طلب بث - مركز سيبويه</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      font-weight: 800;
      background-color: #FBF9F7;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 30px;
      position: relative;
    }

    /* لودر صغير وأنيق */
    #loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 30px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      z-index: 9999;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      opacity: 1;
      visibility: visible;
      transition: opacity 0.5s, visibility 0.5s;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .mini-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #E2E8F0;
      border-top-color: #C9A84C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      font-size: 16px;
      font-weight: 800;
      color: #1E4D5C;
    }

    /* المحتوى الرئيسي */
    .main-content {
      max-width: 560px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .header-logo {
      text-align: center;
      margin-bottom: 5px;
    }

    .header-logo img {
      width: 120px;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      text-align: center;
      color: #1E4D5C;
      line-height: 1.4;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
    }

    label {
      font-size: 16px;
      font-weight: 800;
      color: #1E4D5C;
      margin-bottom: 2px;
    }

    /* حقل مودرن بخط سفلي فقط */
    input {
      width: 100%;
      padding: 14px 4px;
      font-size: 17px;
      font-weight: 800;
      color: #1e293b;
      background: transparent;
      border: none;
      border-bottom: 3px solid #CBD5E1;
      border-radius: 0;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-bottom-color: #C9A84C;
      box-shadow: 0 4px 6px -4px rgba(201,168,76,0.3);
    }

    input::placeholder {
      color: #94A3B8;
      font-weight: 600;
    }

    .btn-submit {
      width: 100%;
      padding: 18px;
      font-size: 19px;
      font-weight: 900;
      background: linear-gradient(135deg, #1E4D5C 0%, #266678 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 1px;
      box-shadow: 0 8px 20px rgba(30,77,92,0.2);
      margin-top: 18px;
    }

    .btn-submit:hover {
      background: linear-gradient(135deg, #163640 0%, #1d5260 100%);
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(30,77,92,0.3);
    }

    .btn-submit:active {
      transform: scale(0.97);
    }

    .error-msg {
      display: none;
      text-align: center;
      font-size: 15px;
      font-weight: 800;
      color: #b91c1c;
      margin-top: 8px;
      padding: 12px;
      background: #fee2e2;
      border-radius: 12px;
    }

    @media (max-width: 500px) {
      body {
        padding: 40px 20px;
      }
      .title {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  <!-- لودر صغير وأنيق -->
  <div id="loader">
    <div class="mini-spinner"></div>
    <span class="loader-text">جاري التحميل...</span>
  </div>

  <div class="main-content" id="mainContent">
    <div class="header-logo">
      <img src="https://i.postimg.cc/jSyt9RmC/20260518-032804.png" alt="Logo">
    </div>
    <h1 class="title">طلب الحصول علي بث مع المعلم</h1>

    <form id="slide1Form">
      <div class="form-group">
        <label for="full_name">الاسم الكامل *</label>
        <input type="text" id="full_name" required placeholder="أدخل اسمك الكامل">
      </div>
      <div class="form-group">
        <label for="email">البريد الإلكتروني *</label>
        <input type="email" id="email" required placeholder="example@mail.com">
      </div>
      <div class="form-group">
        <label for="phone1">رقم الهاتف الأساسي *</label>
        <input type="tel" id="phone1" required placeholder="+2010xxxxxxxx">
      </div>
      <div class="form-group">
        <label for="phone2">رقم هاتف آخر *</label>
        <input type="tel" id="phone2" required placeholder="+2010xxxxxxxx">
      </div>
      <div class="form-group">
        <label for="hour_value">الساعة *</label>
        <input type="time" id="hour_value" required>
      </div>
      <div class="form-group">
        <label for="day_value">اليوم *</label>
        <input type="date" id="day_value" required>
      </div>
      <button type="submit" class="btn-submit">إرسال الطلب</button>
    </form>
    <div class="error-msg" id="errorMsg">❌ حدث خطأ، حاول مرة أخرى.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mxacecdlzckykkvdpzbz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_-1TlYGF9ZprgRnTuS5UK1w_07BvRaBD';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('slide1Form');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const full_name = document.getElementById('full_name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone1 = document.getElementById('phone1').value.trim();
      const phone2 = document.getElementById('phone2').value.trim();
      const hour_value = document.getElementById('hour_value').value;
      const day_value = document.getElementById('day_value').value;

      if (!full_name || !email || !phone1 || !phone2 || !hour_value || !day_value) {
        errorMsg.textContent = '⚠️ من فضلك أكمل جميع الحقول.';
        errorMsg.style.display = 'block';
        return;
      }

      const { error } = await sb
        .from('slide1_submissions')
        .insert([{ full_name, email, phone1, phone2, hour_value, day_value }]);

      if (error) {
        console.error('Insert error:', error);
        errorMsg.textContent = '❌ فشل في حفظ البيانات. تأكد من الاتصال أو صلاحية الحقول.';
        errorMsg.style.display = 'block';
      } else {
        form.reset();
      }
    });

    // إخفاء اللودر بعد 2 ثانية
    window.addEventListener('load', function() {
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
      }, 2000);
    });
  </script>
</body>
</html>
